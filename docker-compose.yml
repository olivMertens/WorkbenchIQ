# =============================================================================
# GroupaIQ — Docker Compose for local development
# =============================================================================
# Usage:
#   cp .env.example .env   # Fill in Azure endpoints/keys
#   docker compose up --build
#
# Services:
#   - api:      FastAPI backend on port 8000
#   - frontend: Next.js frontend on port 3000
#   - postgres: PostgreSQL 16 + pgvector on port 5432
# =============================================================================

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_BACKEND=postgresql
      - POSTGRESQL_HOST=postgres
      - POSTGRESQL_PORT=5432
      - POSTGRESQL_DATABASE=groupaiq
      - POSTGRESQL_USER=groupaiq
      - POSTGRESQL_PASSWORD=groupaiq-dev-password
      - POSTGRESQL_SSL_MODE=disable
      - RAG_ENABLED=true
      - STORAGE_BACKEND=local
      - UW_APP_STORAGE_ROOT=data
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - app-data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        API_URL: http://api:8000
    ports:
      - "3000:3000"
    environment:
      - API_URL=http://api:8000
      - HOSTNAME=0.0.0.0
    depends_on:
      - api
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=groupaiq
      - POSTGRES_USER=groupaiq
      - POSTGRES_PASSWORD=groupaiq-dev-password
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U groupaiq -d groupaiq"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
  app-data:
