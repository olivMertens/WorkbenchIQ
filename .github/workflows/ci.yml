name: CI — Lint & Build Check

# Runs on every push/PR to verify code quality BEFORE any deploy
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────
  # Backend: Python lint + import check
  # ──────────────────────────────────────────────
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Setup Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --frozen --no-dev

      - name: Ruff lint
        run: uv run ruff check app/ api_server.py scripts/

      - name: Ruff format check
        run: uv run ruff format --check app/ api_server.py

      - name: Import check (verify app loads)
        run: |
          uv run python -c "
          from api_server import app
          assert app.title == 'GroupaIQ API', f'Unexpected title: {app.title}'
          print('✅ Backend import check passed')
          "

  # ──────────────────────────────────────────────
  # Frontend: TypeScript lint + build
  # ──────────────────────────────────────────────
  frontend-lint-build:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Next.js lint
        run: npm run lint

      - name: Next.js build
        run: npm run build
        env:
          COMMIT_SHA: ${{ github.sha }}

  # ──────────────────────────────────────────────
  # Docker: Verify Dockerfiles build correctly
  # ──────────────────────────────────────────────
  docker-build-check:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [backend-lint, frontend-lint-build]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: groupaiq-api:ci-check
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: groupaiq-frontend:ci-check
          cache-from: type=gha
          cache-to: type=gha,mode=max
