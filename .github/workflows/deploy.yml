name: CD — Build & Deploy to Azure

# Deploy to ACA after CI passes on main, or manually
on:
  workflow_run:
    workflows: ["CI — Lint & Build Check"]
    branches: [main]
    types: [completed]
  workflow_dispatch:
    inputs:
      deploy_api:
        description: 'Deploy API backend'
        type: boolean
        default: true
      deploy_frontend:
        description: 'Deploy Frontend'
        type: boolean
        default: true

# Required secrets (set in GitHub repo Settings → Secrets):
#   AZURE_CLIENT_ID        — App registration client ID (OIDC)
#   AZURE_TENANT_ID        — Azure AD tenant ID
#   AZURE_SUBSCRIPTION_ID  — Azure subscription ID
#   GROUPAIQ_API_KEY       — Backend API key (min 32 chars)

env:
  RESOURCE_GROUP: rg-groupaiq-prod
  ACR_NAME: acrgroupaiqprod
  API_APP: ca-api-prod
  FRONTEND_APP: ca-frontend-prod

permissions:
  id-token: write   # OIDC login
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false  # Never cancel a running deploy

jobs:
  # ──────────────────────────────────────────────
  # Gate: Only deploy if CI succeeded
  # ──────────────────────────────────────────────
  check-ci:
    name: Verify CI passed
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - run: echo "CI passed — proceeding with deploy"

  # ──────────────────────────────────────────────
  # Detect which services changed
  # ──────────────────────────────────────────────
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    needs: check-ci
    outputs:
      api: ${{ steps.filter.outputs.api }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'app/**'
              - 'api_server.py'
              - 'prompts/**'
              - 'Dockerfile'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'scripts/startup.sh'
            frontend:
              - 'frontend/**'

  # ──────────────────────────────────────────────
  # Build & Push API image to ACR
  # ──────────────────────────────────────────────
  build-api:
    name: Build API Image
    runs-on: ubuntu-latest
    needs: changes
    if: >
      needs.changes.outputs.api == 'true' ||
      github.event.inputs.deploy_api == 'true'
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Set image tag
        id: meta
        run: |
          TAG=$(echo ${{ github.sha }} | cut -c1-7)
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "tags=${{ env.ACR_NAME }}.azurecr.io/groupaiq-api:$TAG" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.ACR_NAME }}.azurecr.io/groupaiq-api:${{ steps.meta.outputs.tag }}
            ${{ env.ACR_NAME }}.azurecr.io/groupaiq-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────
  # Build & Push Frontend image to ACR
  # ──────────────────────────────────────────────
  build-frontend:
    name: Build Frontend Image
    runs-on: ubuntu-latest
    needs: [changes, build-api]
    # Build frontend if frontend changed, or if API changed (to pick up new API URL)
    if: >
      always() &&
      (needs.changes.outputs.frontend == 'true' ||
       github.event.inputs.deploy_frontend == 'true')
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Get API URL for frontend build
        id: api-url
        run: |
          API_FQDN=$(az containerapp show -n ${{ env.API_APP }} -g ${{ env.RESOURCE_GROUP }} --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "url=https://$API_FQDN" >> $GITHUB_OUTPUT

      - name: Set image tag
        id: meta
        run: |
          TAG=$(echo ${{ github.sha }} | cut -c1-7)
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.ACR_NAME }}.azurecr.io/groupaiq-frontend:${{ steps.meta.outputs.tag }}
            ${{ env.ACR_NAME }}.azurecr.io/groupaiq-frontend:latest
          build-args: |
            API_URL=${{ steps.api-url.outputs.url }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────
  # Deploy to Azure Container Apps
  # ──────────────────────────────────────────────
  deploy:
    name: Deploy to ACA
    runs-on: ubuntu-latest
    needs: [build-api, build-frontend]
    if: always() && (needs.build-api.result == 'success' || needs.build-frontend.result == 'success')
    environment: production
    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set image tag
        id: meta
        run: |
          TAG=$(echo ${{ github.sha }} | cut -c1-7)
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Deploy API to ACA
        if: needs.build-api.result == 'success'
        run: |
          az containerapp update \
            --name ${{ env.API_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/groupaiq-api:${{ steps.meta.outputs.tag }}

      - name: Deploy Frontend to ACA
        if: needs.build-frontend.result == 'success'
        run: |
          az containerapp update \
            --name ${{ env.FRONTEND_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/groupaiq-frontend:${{ steps.meta.outputs.tag }}

      - name: Verify API health
        run: |
          API_FQDN=$(az containerapp show -n ${{ env.API_APP }} -g ${{ env.RESOURCE_GROUP }} --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "Checking https://$API_FQDN ..."
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://$API_FQDN")
            if [ "$STATUS" = "200" ]; then
              echo "✅ API health check passed (HTTP $STATUS)"
              break
            fi
            echo "⏳ Attempt $i: HTTP $STATUS — waiting 10s..."
            sleep 10
          done
          if [ "$STATUS" != "200" ]; then
            echo "❌ API health check failed after 5 attempts"
            exit 1
          fi

      - name: Print deployment URLs
        run: |
          API_FQDN=$(az containerapp show -n ${{ env.API_APP }} -g ${{ env.RESOURCE_GROUP }} --query "properties.configuration.ingress.fqdn" -o tsv)
          FE_FQDN=$(az containerapp show -n ${{ env.FRONTEND_APP }} -g ${{ env.RESOURCE_GROUP }} --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "============================================="
          echo "🚀 Deployment Complete!"
          echo "============================================="
          echo "API:      https://$API_FQDN"
          echo "Frontend: https://$FE_FQDN"
          echo "Tag:      ${{ steps.meta.outputs.tag }}"
          echo "============================================="
